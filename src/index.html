<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codexit</title>
    <link rel="stylesheet" href="./renderer.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="brand">
          <img class="brand-mark" src="./assets/codexit-mark.svg" alt="" />
          <div>
            <p class="eyebrow">Local Codex Switcher</p>
            <h1>Codexit</h1>
            <p id="summary" class="summary">-</p>
          </div>
        </div>
        <div class="actions" aria-label="全局操作">
          <button id="openHomeBtn" class="button secondary" type="button">
            <span class="button-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M3.75 6.75h6.1l1.55 1.9h8.85v8.6a2 2 0 0 1-2 2H5.75a2 2 0 0 1-2-2V6.75Z"/><path d="M3.75 10h16.5"/></svg>
            </span>
            <span>打开目录</span>
          </button>
          <button id="refreshAllBtn" class="button secondary" type="button">
            <span class="button-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M20 12a8 8 0 0 1-13.65 5.65"/><path d="M4 12A8 8 0 0 1 17.65 6.35"/><path d="M17 2.75v4h4"/><path d="M7 21.25v-4H3"/></svg>
            </span>
            <span>刷新额度</span>
          </button>
          <button id="addAccountBtn" class="button primary" type="button">
            <span class="button-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            </span>
            <span>添加账号</span>
          </button>
        </div>
      </header>

      <section class="overview" aria-label="账号概览">
        <div class="metric">
          <span>账号</span>
          <strong id="accountCount">0</strong>
        </div>
        <div class="metric">
          <span>当前</span>
          <strong id="currentAccount">未切换</strong>
        </div>
        <div class="metric">
          <span>状态</span>
          <strong id="attentionCount">正常</strong>
        </div>
      </section>

      <section id="status" class="status" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="statusText">准备就绪</span>
      </section>

      <section id="accountList" class="account-list" aria-live="polite"></section>
      <section id="emptyState" class="empty hidden">
        <img class="empty-mark" src="./assets/codexit-mark.svg" alt="" />
        <h2>还没有账号</h2>
        <button id="emptyAddBtn" class="button primary" type="button">
          <span class="button-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          </span>
          <span>添加 OpenAI 账号</span>
        </button>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
